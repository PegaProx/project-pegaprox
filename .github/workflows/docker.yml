name: Build Docker Image

# MK: builds multi-arch image and pushes to ghcr.io
# triggered on version tags and main pushes

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# MK May 2026 — top-level permissions implicitly cascaded `packages: write`
# into any future job added to this workflow. Aikido flagged it as overly
# broad. Scope per-job instead so only build-and-push gets the GHCR write.
permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # MK May 2026 — minimum perms for the build:
    #   contents: read   → actions/checkout@v4
    #   packages: write  → docker/login-action@v3 + push to ghcr.io
    #   actions:  write  → cache-from / cache-to: type=gha (saves ~5-8 min on
    #                      multi-arch builds; without it the cache write fails
    #                      silently and we lose layer reuse between runs)
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pegaprox/pegaprox
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
